<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestorSemi — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1>Gestor<span>Semi</span></h1>
      <p>Maison Les Sis — Sistema de Gestão</p>
    </div>
    <div class="form-group">
      <label>Login</label>
      <input type="text" id="login" placeholder="Seu login" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="entrar()">Entrar</button>
    <div class="login-erro" id="erro"></div>
    <div class="credenciais-hint">
      <strong>Credenciais padrão</strong>
      Admin: <strong>admin</strong> / <strong>admin123</strong><br>
      Funcionário: <strong>funcionario</strong> / <strong>func123</strong>
    </div>
  </div>
  <script>
    async function verificarJaLogado() {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) window.location.href = '/index.html';
      } catch (e) {}
    }
    verificarJaLogado();

    async function entrar() {
      const login = document.getElementById('login').value.trim();
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('erro');
      erro.style.display = 'none';
      if (!login || !senha) { erro.textContent = 'Preencha login e senha.'; erro.style.display = 'block'; return; }
      const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ login, senha }) });
      const data = await res.json();
      if (!res.ok) { erro.textContent = data.erro; erro.style.display = 'block'; return; }
      window.location.href = '/index.html';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
  </script>
</body>
</html>
