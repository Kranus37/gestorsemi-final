<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestorSemi — Produtos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">Gestor<span>Semi</span></a>
  <a href="index.html">Dashboard</a>
  <a href="produtos.html" class="ativo">Produtos</a>
  <a href="vendas.html">Vendas</a>
  <a href="estoque.html">Estoque</a>
  <a href="relatorio.html">Relatório</a>
  <a href="usuarios.html" id="linkUsuarios">Usuários</a>
  <div id="navUsuario"></div>
</nav>
<div class="container">
  <div class="page-header">
    <h1>Produtos</h1>
    <p>Gerencie o catálogo completo de semijoias</p>
  </div>
  <div class="secao">
    <div class="tabela-topo">
      <input type="text" id="busca" placeholder="Buscar por nome ou categoria..." oninput="filtrarTabela()" style="padding:8px 12px;border:1px solid #e8dcc8;border-radius:7px;font-size:0.88rem;width:280px;outline:none;">
      <div style="display:flex;align-items:center;gap:12px">
        <span id="totalLabel" style="font-size:0.9rem;color:#888"></span>
        <button class="btn btn-primario" id="btnNovo" onclick="abrirNovo()" style="display:none">+ Novo produto</button>
      </div>
    </div>
    <div class="tabela-wrapper">
      <table>
        <thead><tr><th>Produto</th><th>Categoria</th><th>Preço de custo</th><th>Preço de venda</th><th>Margem</th><th>Estoque</th><th id="thAcoes"></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" class="vazio">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitulo">Novo Produto</h2>
    <input type="hidden" id="produtoId">
    <div class="form-group"><label>Nome da peça</label><input type="text" id="nome" placeholder="Ex: Brinco argola dourada"></div>
    <div class="form-group"><label>Categoria</label>
      <select id="categoria"><option value="">Selecione...</option><option>Brinco</option><option>Colar</option><option>Pulseira</option><option>Anel</option><option>Tornozeleira</option><option>Conjunto</option><option>Outro</option></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Preço de custo (R$)</label><input type="number" id="precoCusto" step="0.01" min="0" placeholder="0,00"></div>
      <div class="form-group"><label>Preço de venda (R$)</label><input type="number" id="precoVenda" step="0.01" min="0" placeholder="0,00"></div>
    </div>
    <div class="form-group"><label>Quantidade em estoque</label><input type="number" id="quantidade" min="0" placeholder="0"></div>
    <div class="modal-acoes">
      <button class="btn btn-secundario" onclick="fechar()">Cancelar</button>
      <button class="btn btn-primario" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/auth.js"></script>
<script>
  let perfil = '';
  let todosProdutos = [];

  function estoqueClass(q) { return q === 0 ? 'estoque-zero' : q <= 5 ? 'estoque-baixo' : 'estoque-ok'; }
  function margem(c, v) { if (!c) return '—'; const m = Math.round((v-c)/c*100); return '<span style="color:' + (m>=0?'#27ae60':'#c0392b') + ';font-weight:600">' + m + '%</span>'; }

  async function init() {
    const usuario = await verificarAuth();
    if (!usuario) return;
    perfil = usuario.perfil;
    configurarNavbar(usuario);
    if (perfil === 'admin') {
      document.getElementById('btnNovo').style.display = '';
      document.getElementById('thAcoes').textContent = 'Ações';
    }
    carregar();
  }

  async function carregar() {
    todosProdutos = await fetch('/api/produtos').then(r => r.json());
    filtrarTabela();
  }

  function filtrarTabela() {
    const termo = document.getElementById('busca').value.toLowerCase().trim();
    const lista = termo === '' ? todosProdutos : todosProdutos.filter(p =>
      p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo)
    );
    document.getElementById('totalLabel').textContent = lista.length + ' produto(s)';
    const tbody = document.getElementById('tbody');
    if (lista.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="vazio">' + (termo ? 'Nenhum produto encontrado para "' + termo + '".' : 'Nenhum produto cadastrado.') + '</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(p =>
      '<tr><td><strong>' + p.nome + '</strong></td><td><span class="badge badge-dourado">' + p.categoria + '</span></td><td>' + fmt(p.preco_custo) + '</td><td>' + fmt(p.preco_venda) + '</td><td>' + margem(p.preco_custo, p.preco_venda) + '</td><td><span class="' + estoqueClass(p.quantidade) + '">' + p.quantidade + ' un.</span></td><td>' +
      (perfil === 'admin' ? '<div class="acoes"><button class="btn btn-editar" onclick="editar(' + p.id + ')">Editar</button><button class="btn btn-perigo" onclick="excluir(' + p.id + ',\'' + p.nome.replace(/'/g,"\\'") + '\')">Excluir</button></div>' : '') +
      '</td></tr>'
    ).join('');
  }

  function abrirNovo() {
    document.getElementById('modalTitulo').textContent = 'Novo Produto';
    document.getElementById('produtoId').value = '';
    ['nome','precoCusto','precoVenda','quantidade'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('categoria').value = '';
    document.getElementById('overlay').classList.add('aberto');
  }

  async function editar(id) {
    const p = await fetch('/api/produtos/' + id).then(r => r.json());
    document.getElementById('modalTitulo').textContent = 'Editar Produto';
    document.getElementById('produtoId').value = p.id;
    document.getElementById('nome').value = p.nome;
    document.getElementById('categoria').value = p.categoria;
    document.getElementById('precoCusto').value = p.preco_custo;
    document.getElementById('precoVenda').value = p.preco_venda;
    document.getElementById('quantidade').value = p.quantidade;
    document.getElementById('overlay').classList.add('aberto');
  }

  function fechar() { document.getElementById('overlay').classList.remove('aberto'); }

  async function salvar() {
    const id = document.getElementById('produtoId').value;
    const body = { nome: document.getElementById('nome').value.trim(), categoria: document.getElementById('categoria').value, preco_custo: parseFloat(document.getElementById('precoCusto').value)||0, preco_venda: parseFloat(document.getElementById('precoVenda').value)||0, quantidade: parseInt(document.getElementById('quantidade').value)||0 };
    if (!body.nome || !body.categoria) return toast('Preencha nome e categoria', 'erro');
    const res = await fetch(id ? '/api/produtos/'+id : '/api/produtos', { method: id?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json(); return toast(e.erro, 'erro'); }
    fechar(); toast(id ? 'Produto atualizado!' : 'Produto cadastrado!', 'sucesso'); carregar();
  }

  async function excluir(id, nome) {
    if (!confirm('Excluir "' + nome + '"?')) return;
    const res = await fetch('/api/produtos/'+id, { method:'DELETE' });
    if (!res.ok) { const e = await res.json(); return toast(e.erro, 'erro'); }
    toast('Produto excluído', 'sucesso'); carregar();
  }

  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) fechar(); });
  init();
</script>
</body>
</html>
